    <style>
        :root{--bg:#0f0f0f;--card:#1a1a1a;--accent:#e50914;--text:#fff;--text-secondary:#ccc;--hover:#2a2a2a;--border-dim:rgba(255,255,255,0.08);--input-bg:rgba(255,255,255,.07);--shadow:rgba(0,0,0,0.5)}[data-theme="light"]{--bg:#f5f5f5;--card:#ffffff;--accent:#e50914;--text:#1a1a1a;--text-secondary:#444;--hover:#e0e0e0;--border-dim:rgba(0,0,0,0.1);--input-bg:rgba(0,0,0,0.04);--shadow:rgba(0,0,0,0.1)}*{margin:0;padding:0;box-sizing:border-box}body,html{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;transition:background .2s,color .2s}.app-container{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}.top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 24px;background:rgba(0,0,0,0.6);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-dim);flex-shrink:0}[data-theme="light"] .top-bar{background:rgba(255,255,255,0.7)}.left-group{display:flex;align-items:center;gap:20px}.brand-logo{display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,rgba(229,9,20,0.2),rgba(0,0,0,0.4));padding:5px 16px;border-radius:40px;border-left:3px solid var(--accent)}.brand-logo i{font-size:1.6rem;color:var(--accent)}.brand-name{font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,#fff,#ffb3b3);-webkit-background-clip:text;background-clip:text;color:transparent}[data-theme="light"] .brand-name{background:linear-gradient(135deg,#111,#e50914);-webkit-background-clip:text;background-clip:text;color:transparent}.brand-tag{font-size:.65rem;background:rgba(229,9,20,0.8);padding:2px 8px;border-radius:30px;font-weight:600;color:#fff}.theme-toggle{background:var(--input-bg);border:1px solid var(--border-dim);border-radius:50px;padding:6px 12px;cursor:pointer;color:var(--text);font-size:.9rem;display:flex;align-items:center;gap:6px;transition:.2s}.theme-toggle:hover{background:var(--accent);color:#fff}.social-icons a{color:var(--text-secondary);font-size:1.4rem;margin-left:18px;transition:.2s}.social-icons a:hover{color:var(--accent);transform:scale(1.05)}.main-row{display:flex;flex:1;min-height:0;overflow:hidden}.player-section{flex:3;display:flex;flex-direction:column;background:#000;padding:20px;gap:16px;overflow-y:auto}.video-container{position:relative;background:#000;border-radius:24px;overflow:hidden;box-shadow:0 15px 30px var(--shadow);width:100%;height:65vh;min-height:480px}#video-player{width:100%;height:100%;object-fit:contain;background:#000}.video-info{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}.video-info h1{font-size:1.3rem;font-weight:600;display:flex;align-items:center;gap:10px}.live-badge{background:var(--accent);font-size:.7rem;padding:3px 10px;border-radius:30px;font-weight:600}.quality-selector,.quality-selector option{background-color:#2a2a2a!important;color:#fff!important;border:1px solid var(--border-dim);border-radius:40px;padding:6px 14px;font-size:.8rem;font-weight:500;cursor:pointer;outline:0;min-width:130px}.quality-selector:focus,.quality-selector:hover{background-color:#2a2a2a!important;color:#fff!important}[data-theme="light"] .quality-selector,[data-theme="light"] .quality-selector option{background-color:#2a2a2a!important;color:#fff!important}.sidebar{flex:1.2;min-width:320px;background:var(--card);display:flex;flex-direction:column;border-left:1px solid var(--border-dim);overflow:hidden}.search-container{padding:14px 20px 10px;border-bottom:1px solid var(--border-dim)}#channel-search{width:100%;padding:8px 14px;border-radius:32px;border:1px solid var(--border-dim);background:var(--input-bg);color:var(--text);font-size:.8rem;outline:0}#channel-search:focus{border-color:var(--accent)}.category-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;max-height:70px;overflow-y:auto}.cat-tab{padding:5px 12px;border-radius:30px;background:rgba(128,128,128,0.15);color:var(--text);font-size:11px;border:none;cursor:pointer;white-space:nowrap}.cat-tab.active{background:var(--accent);color:#fff}.channel-list{list-style:none;margin:0;padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:14px;overflow-y:auto;flex:1}.channel-item{background:rgba(128,128,128,0.08);border-radius:16px;cursor:pointer;text-align:center;transition:.2s;border:2px solid transparent;padding:10px 4px}.channel-item:hover{background:var(--hover);transform:translateY(-2px)}.channel-item.active{border-color:var(--accent);background:rgba(229,9,20,0.1)}.logo-wrapper{width:60px;height:60px;margin:0 auto 6px;background:#111;border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:5px}.channel-logo{max-width:100%;max-height:100%;object-fit:contain}.channel-name{font-size:.65rem;font-weight:600;color:var(--text-secondary);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.app-footer{background:rgba(0,0,0,0.7);text-align:center;padding:8px 12px;font-size:.65rem;color:#aaa;border-top:1px solid var(--border-dim);flex-shrink:0}[data-theme="light"] .app-footer{background:rgba(240,240,240,0.8);color:#333}.loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;z-index:10;backdrop-filter:blur(6px);border-radius:24px;flex-direction:column;gap:8px}.global-loader{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0a;z-index:2000;display:flex;align-items:center;justify-content:center;color:#fff;flex-direction:column;gap:12px}[data-theme="light"] .global-loader{background:#f0f0f0;color:#111}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#222}::-webkit-scrollbar-thumb{background:var(--accent)}@media (max-width:992px){.main-row{flex-direction:column}.sidebar{min-width:100%;max-height:45vh}.video-container{height:50vh;min-height:300px}body,html{overflow:auto}.app-container{overflow-y:auto}}@media (max-width:768px){.brand-tag,.social-icons{display:none!important}body,html{overflow:auto;height:auto}.app-container{height:auto;min-height:100vh;overflow:visible;display:block}.main-row{display:block;height:auto;overflow:visible}.top-bar{padding:4px 12px!important;background:#000!important;border-bottom:none}.brand-logo{padding:2px 8px!important;gap:5px;background:transparent;border-left:2px solid var(--accent)}.brand-name{font-size:.9rem!important}.brand-logo i{font-size:1rem!important}.theme-toggle span{display:none}.theme-toggle{padding:4px 8px;font-size:.8rem;background:rgba(255,255,255,0.1)}.player-section{padding:0!important;gap:0!important;background:#000;display:block;height:auto;overflow:visible}.video-container{border-radius:0!important;height:30vh!important;min-height:230px;box-shadow:none;margin:0;width:100%}#video-player{object-fit:contain}.video-info{padding:8px 12px!important;margin:0;background:#000;border-bottom:1px solid #1a1a1a}.video-info h1{font-size:.9rem}.live-badge{font-size:.6rem;padding:2px 7px}.quality-selector{min-width:100px;font-size:.65rem;padding:4px 8px}.sidebar{background:#000!important;border-left:none;border-top:none;height:auto!important;max-height:none!important;display:block;overflow:visible;margin:0}.search-container{padding:8px 10px 4px!important;background:#0a0a0a;border-bottom:1px solid #1a1a1a}#channel-search{background:#1c1c1c;border:none;font-size:.7rem;padding:6px 10px;border-radius:30px}.category-tabs{margin-top:6px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:4px;gap:5px;max-height:none}.cat-tab{font-size:9px;padding:4px 10px;background:#1e1e1e}.channel-list{padding:8px 6px 16px!important;grid-template-columns:repeat(auto-fill,minmax(70px,1fr))!important;gap:6px;background:#000;overflow-y:visible;height:auto}.logo-wrapper{width:44px;height:44px;background:#111;margin-bottom:3px}.channel-name{font-size:.5rem;font-weight:500}.channel-item{background:#0f0f0f;padding:4px 2px;border-radius:10px}.app-footer{padding:8px 6px;font-size:.45rem;background:#050505;border-top:none}.loading-overlay{border-radius:0;font-size:10px}}@media (max-width:480px){.channel-list{grid-template-columns:repeat(auto-fill,minmax(62px,1fr))!important;gap:5px}.logo-wrapper{width:40px;height:40px}.channel-name{font-size:.45rem}}.controls-wrapper-row{display:flex;align-items:center;gap:12px;margin-top:10px;flex-wrap:wrap}.volume-inline-control{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border-dim);padding:8px 12px;border-radius:6px;color:var(--text);font-size:.85rem;height:38px}.volume-inline-control i{width:16px;text-align:center;color:var(--text-secondary)}.inline-vol-slider{-webkit-appearance:none;appearance:none;width:90px;height:4px;border-radius:2px;background:var(--hover);outline:0;cursor:pointer}.inline-vol-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}.inline-vol-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer}.bottom-nav-row{display:flex;align-items:center;justify-content:center;gap:15px;margin-top:15px;width:100%}.nav-btn{background:var(--card);color:var(--text);border:1px solid var(--border-dim);padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:500;display:flex;align-items:center;gap:8px;transition:all .2s ease}.nav-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
    </style>
</head>
<body data-theme="dark">
<div class="app-container">
    <div class="top-bar">
        <div class="left-group">
            <div class="brand-logo"><i class="fas fa-tv"></i><div><span class="brand-name">NIS TV Pro</span><span class="brand-tag">LIVE</span></div></div>
            <div class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span id="themeText">ডার্ক</span></div>
        </div>
        <div class="social-icons"><a href="https://facebook.com/nisobuj01" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a><a href="https://t.me/nisobuj00" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a></div>
    </div>
    <div class="main-row">
        <main class="player-section">
            <div class="video-container" id="video-container"><video id="video-player" controls playsinline preload="auto"></video></div>
            <div class="video-info">
                <h1 id="now-playing-title">📺 T Sports 2 <span class="live-badge">LIVE</span></h1>
                
                <div class="controls-wrapper-row">
                    <div class="volume-inline-control">
                        <i class="fas fa-volume-up" id="inline-vol-icon"></i>
                        <input type="range" id="inline-volume-slider" class="inline-vol-slider" min="0" max="1" step="0.05" value="1">
                        <span id="inline-vol-text">100%</span>
                    </div>

                    <select id="quality-selector" class="quality-selector" disabled>
                        <option value="auto">⚡ Auto (স্বয়ংক্রিয়)</option>
                    </select>
                </div>

                <div class="bottom-nav-row">
                    <button class="nav-btn" id="btn-prev-channel"><i class="fas fa-arrow-left"></i> Prev Channel</button>
                    <button class="nav-btn" id="btn-next-channel">Next Channel <i class="fas fa-arrow-right"></i></button>
                </div>
            </div>
        </main>
        <aside class="sidebar">
            <div class="search-container">
                <input id="channel-search" placeholder="🔍 Search Channel..." autocomplete="off">
                <div class="category-tabs" id="dynamic-category-tabs"><button class="cat-tab active" data-cat="all">📡 All</button></div>
            </div>
            <ul class="channel-list" id="listbar"><li style="text-align:center; padding: 30px;">📡 Loading...</li></ul>
        </aside>
    </div>
    <footer class="app-footer"><span>We do not stream any channel. We only show you from third party websites | 2026 NIS TV Pro</span></footer>
</div>
<div id="global-loader" class="global-loader"><i class="fas fa-tv" style="font-size: 42px; color:#e50914;"></i><div>NIS TV Pro 🚀</div></div>

<script>
!function(){
    const _0xP="\x68\x74\x74\x70\x73\x3a\x2f\x2f\x74\x76\x2d\x70\x72\x6f\x78\x79\x2e\x73\x68\x61\x68\x69\x6e\x72\x68\x73\x73\x39\x39\x2e\x77\x6f\x72\x6b\x65\x72\x73\x2e\x64\x65\x76";
    const getConfigUrl=()=>`${_0xP}?source=playlist&t=${Date.now()}`;
    let FIXED_PLAYLISTS=[],allChannels=[],activeCategory="all",currentChannel=null,hls=null,searchQuery="";
    let currentLoadRetries=0,MAX_RETRIES=2,retryTimeout=null,globalErrorShown=!1;
    const qualitySelector=document.getElementById("quality-selector"),listBar=document.getElementById("listbar"),titleEl=document.getElementById("now-playing-title"),videoPlayer=document.getElementById("video-player"),searchInput=document.getElementById("channel-search"),catsContainer=document.getElementById("dynamic-category-tabs"),globalLoader=document.getElementById("global-loader"),themeToggle=document.getElementById("themeToggleBtn");
    
    function initTheme(){let e=localStorage.getItem("nis_theme")||"dark";document.body.setAttribute("data-theme",e);updateThemeUI(e)}
    function updateThemeUI(e){const t=themeToggle.querySelector("i"),n=document.getElementById("themeText");if(e==="dark"){t.className="fas fa-moon";n.innerText="Dark"}else{t.className="fas fa-sun";n.innerText="Light"}}
    function toggleTheme(){const e=document.body.getAttribute("data-theme");const t=e==="dark"?"light":"dark";document.body.setAttribute("data-theme",t);localStorage.setItem("nis_theme",t);updateThemeUI(t)}
    themeToggle.addEventListener("click",toggleTheme);initTheme();

    function populateQualitySelectorWithLevels(e){
        if(!qualitySelector)return;
        qualitySelector.innerHTML="";
        const t=document.createElement("option");t.value="auto";t.textContent="⚡ Auto (Quality)";qualitySelector.appendChild(t);
        if(!e||e.length===0){
            qualitySelector.disabled=!0;
            const n=document.createElement("option");n.textContent="❌ No Quality Info";n.disabled=!0;qualitySelector.appendChild(n);
            return;
        }
        qualitySelector.disabled=!1;
        const n=[...e].sort((a,b)=>(a.height||0)-(b.height||0));
        for(let o=0;o<n.length;o++){
            const r=n[o];let a="";const i=r.height;
            if(i){a=i<=240?"426x240":i<=360?"640x360":i<=480?"854x480":i<=720?"1280x720":"1920x1080";if(a==="1920x1080"&&i<1080&&i>720)a=`${i}p`}else if(r.bitrate){a=`${Math.round(r.bitrate/1000)} kbps`}else{a=`Quality ${o+1}`}
            const s=e.findIndex(orig=>orig===r);const l=document.createElement("option");l.value=s;l.textContent=a;qualitySelector.appendChild(l);
        }
        qualitySelector.value="auto";if(hls)hls.currentLevel=-1;
    }

    function attachQualityEvents(){if(!qualitySelector)return;qualitySelector.onchange=()=>{const e=qualitySelector.value;if(hls){if(e==="auto")hls.currentLevel=-1;else hls.currentLevel=parseInt(e,10)}}}
    
    function destroyHls(){
        if(hls){try{hls.destroy()}catch(e){}hls=null}
        if(retryTimeout)clearTimeout(retryTimeout);
        if(qualitySelector)qualitySelector.disabled=!0;
    }

    function scheduleRetry(e){
        if(currentLoadRetries>=MAX_RETRIES){
            if(!globalErrorShown){globalErrorShown=!0;alert("⚠️Multiple failed attempts! Check the network or select another channel")}
            const t=document.querySelector(".loading-overlay");if(t)t.remove();return;
        }
        currentLoadRetries++;const t=currentLoadRetries*1500;
        if(retryTimeout)clearTimeout(retryTimeout);
        let n=document.querySelector(".loading-overlay");
        if(n)n.innerHTML=`<i class="fas fa-sync-alt fa-spin"></i> Try again (${currentLoadRetries}/${MAX_RETRIES})...`;
        retryTimeout=setTimeout(()=>{performLoadWithRetry(e)},t);
    }

    function performLoadWithRetry(e){
        videoPlayer.pause();destroyHls();
        let t=document.querySelector(".loading-overlay");
        if(!t){t=document.createElement("div");t.className="loading-overlay";document.getElementById("video-container").appendChild(t)}
        t.style.display="flex";t.innerHTML=`<i class="fas fa-circle-notch fa-spin"></i> Streaming (${currentLoadRetries+1}/${MAX_RETRIES+1})`;
        if(Hls.isSupported()){
            hls=new Hls({enableWorker:!0,lowLatencyMode:!0});hls.loadSource(e);hls.attachMedia(videoPlayer);
            let n=!1;
            const o=()=>{
                globalErrorShown=!1;currentLoadRetries=0;t?.remove();videoPlayer.play().catch(e=>console.log);
                if(hls&&hls.levels&&hls.levels.length){populateQualitySelectorWithLevels(hls.levels);if(qualitySelector.value!=="auto")qualitySelector.value="auto";if(hls.currentLevel!==-1)hls.currentLevel=-1}else{qualitySelector.disabled=!0;qualitySelector.innerHTML='<option value="auto">Auto</option><option disabled>Not Quality</option>'}
                a()
            };
            const r=(t,o)=>{if(o.fatal){if(o.type===Hls.ErrorTypes.NETWORK_ERROR){a();scheduleRetry(e)}else if(o.type===Hls.ErrorTypes.MEDIA_ERROR){if(hls)hls.recoverMediaError()}else{a();scheduleRetry(e)}}else if(o.details==='manifestLoadError'&&!n){n=!0;a();scheduleRetry(e)}};
            const a=()=>{if(hls){hls.off(Hls.Events.MANIFEST_PARSED,o);hls.off(Hls.Events.ERROR,r)}};
            hls.on(Hls.Events.MANIFEST_PARSED,o);hls.on(Hls.Events.ERROR,r);
        }else{t?.remove();if(!globalErrorShown)alert("Your browser does not support HLS.")}
    }

    function loadStream(e){if(retryTimeout)clearTimeout(retryTimeout);currentLoadRetries=0;globalErrorShown=!1;if(qualitySelector){qualitySelector.disabled=!0;qualitySelector.innerHTML='<option value="auto">⚡ Auto (Quality)</option><option disabled>Loading...</option>'}performLoadWithRetry(e)}

    async function loadPlaylistConfig(){try{const e=await fetch(getConfigUrl());if(!e.ok)throw new Error(`HTTP ${e.status}`);const t=await e.json();FIXED_PLAYLISTS=t.sources||[]}catch(e){console.error("❌ Config load failed.:",e);FIXED_PLAYLISTS=[]}}

    async function fetchM3uPlaylist(e){try{const t=await fetch(`${_0xP}?source=${e}`);if(!t.ok)return"";return await t.text()}catch(e){return""}}

    async function parseM3uContent(e){
        const t=e.split(/\r?\n/);const n=[];let o=null;
        for(let r of t){
            r=r.trim();
            if(r.startsWith('#EXTINF')){
                const e=r.match(/#EXTINF:[^,]*,?(.*)$/);let t=e?.[1]?.trim()||"Channel";let a="";let i="Other";
                const s=r.match(/tvg-logo="([^"]*)"/i);if(s)a=s[1];
                const l=r.match(/group-title="([^"]*)"/i);if(l)i=l[1];
                o={name:t,logo:a,category:i}
            }else if(r&&!r.startsWith('#')&&o){n.push({name:o.name.substring(0,45),url:r,category:o.category||"Other",logo:o.logo||""});o=null}else if(r&&!r.startsWith('#')&&(r.includes('.m3u8')||r.includes('.ts'))){n.push({name:`Channel ${n.length+1}`,url:r,category:"Other",logo:""})}
        }return n;
    }

    async function loadAllPlaylists(){
        if(!FIXED_PLAYLISTS.length)return[];
        const e=await Promise.allSettled(FIXED_PLAYLISTS.map(async t=>{if(!t.sourceKey)return[];const n=await fetchM3uPlaylist(t.sourceKey);if(!n)return[];return await parseM3uContent(n)}));
        let t=[];for(const n of e)if(n.status==='fulfilled')t.push(...n.value);
        const n=new Map();for(const e of t)if(!n.has(e.url))n.set(e.url,e);
        let o=Array.from(n.values());
        o=o.map(e=>({...e,logo:(e.logo&&e.logo.startsWith('http'))?e.logo:`https://ui-avatars.com/api/?background=e50914&color=fff&rounded=true&size=70&bold=true&name=${encodeURIComponent(e.name.slice(0,2))}`}));
        return o;
    }

    function buildCategoryTabs(e){
        const t=new Set(["all"]);const n={};
        e.forEach(e=>{const o=e.category||"Other";t.add(o);n[o]=(n[o]||0)+1});
        const o=Array.from(t).sort((a,b)=>a==='all'?-1:b==='all'?1:a.localeCompare(b));
        catsContainer.innerHTML="";
        o.forEach(t=>{
            const o=document.createElement("button");o.className="cat-tab";if(t===activeCategory)o.classList.add("active");o.setAttribute("data-cat",t);
            if(t==="all"){o.innerText=`📡 All Channel; (${e.length})`}else{o.innerText=`${t} (${n[t]||0})`}
            o.onclick=()=>{document.querySelectorAll(".cat-tab").forEach(e=>e.classList.remove("active"));o.classList.add("active");activeCategory=t;filterRender()};
            catsContainer.appendChild(o)
        })
    }

    function filterRender(){
        if(!allChannels.length)return;
        let e=allChannels.filter(e=>{const t=activeCategory==="all"||e.category===activeCategory;const n=searchQuery===""||e.name.toLowerCase().includes(searchQuery.toLowerCase());return t&&n});
        renderChannels(e)
    }

    function renderChannels(e){
        listBar.innerHTML="";
        if(!e.length){listBar.innerHTML=`<div style="padding:30px;text-align:center;">😞 কোন চ্যানেল নেই</div>`;return}
        for(let t of e){
            const e=document.createElement("li");e.className="channel-item";if(currentChannel&&currentChannel.url===t.url)e.classList.add("active");
            const n=t.logo||`https://ui-avatars.com/api/?background=2c2c2c&color=e50914&rounded=true&size=60&name=${encodeURIComponent(t.name.charAt(0))}`;
            e.innerHTML=`<div class="logo-wrapper"><img src="${n}" class="channel-logo" onerror="this.src='https://ui-avatars.com/api/?background=555&color=fff&rounded=true&size=60&text=${encodeURIComponent(t.name.slice(0,2))}'"></div><div class="channel-name">${escapeHtml(t.name)}</div>`;
            e.onclick=()=>{if(retryTimeout)clearTimeout(retryTimeout);currentLoadRetries=0;globalErrorShown=!1;currentChannel=t;titleEl.innerHTML=`${escapeHtml(t.name)} <span class="live-badge">LIVE</span>`;loadStream(t.url);document.querySelectorAll(".channel-item").forEach(t=>t.classList.remove("active"));e.classList.add("active");if(window.innerWidth<992)document.querySelector(".player-section")?.scrollIntoView({behavior:"smooth"})};
            listBar.appendChild(e)
        }
    }

    function escapeHtml(e){return e.replace(/[&<>]/g,e=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[e])}
    searchInput.addEventListener("input",e=>{searchQuery=e.target.value;filterRender()});

    async function initApp(){
        globalLoader.style.display="flex";await loadPlaylistConfig();
        if(!FIXED_PLAYLISTS.length){listBar.innerHTML=`<div style="padding:20px;">⚠️ Playlist config not found.</div>`;globalLoader.style.display="none";return}
        const e=await loadAllPlaylists();
        if(!e.length){listBar.innerHTML=`<div style="padding:20px;">⚠️ No channels found.</div>`;globalLoader.style.display="none";return}
        allChannels=e;buildCategoryTabs(allChannels);activeCategory="all";searchQuery="";filterRender();
        if(allChannels.length){const e=allChannels[0];currentChannel=e;titleEl.innerHTML=`${escapeHtml(e.name)} <span class="live-badge">LIVE</span>`;loadStream(e.url)}
        attachQualityEvents();globalLoader.style.opacity="0";setTimeout(()=>globalLoader.style.display="none",400)
    }

    document.addEventListener("visibilitychange",()=>{if(document.hidden){if(hls)hls.stopLoad();videoPlayer.pause()}else{if(hls)hls.startLoad();if(currentChannel&&videoPlayer.paused&&videoPlayer.src)videoPlayer.play().catch(e=>{})}});
    initApp();

    document.addEventListener("DOMContentLoaded",()=>{
        const e=document.getElementById("btn-prev-channel"),t=document.getElementById("btn-next-channel"),n=document.getElementById("inline-volume-slider"),o=document.getElementById("inline-vol-icon"),r=document.getElementById("inline-vol-text");
        function a(e){
            if(!allChannels||!allChannels.length||!currentChannel)return;
            let t=allChannels.findIndex(e=>e.url===currentChannel.url);if(t===-1)t=0;
            let n=t+e;if(n<0)n=allChannels.length-1;if(n>=allChannels.length)n=0;
            const o=allChannels[n];
            if(retryTimeout)clearTimeout(retryTimeout);currentLoadRetries=0;globalErrorShown=!1;currentChannel=o;
            if(titleEl){titleEl.innerHTML=`${escapeHtml(o.name)} <span class="live-badge">LIVE</span>`}
            loadStream(o.url);filterRender()
        }
        if(e)e.addEventListener("click",()=>a(-1));if(t)t.addEventListener("click",()=>a(1));
        if(n&&videoPlayer){
            n.addEventListener("input",e=>{const t=parseFloat(e.target.value);videoPlayer.volume=t;if(r)r.innerText=Math.round(t*100)+"%";if(t===0){if(o)o.className="fas fa-volume-mute"}else if(t>0&&t<0.5){if(o)o.className="fas fa-volume-down"}else{if(o)o.className="fas fa-volume-up"}});
            videoPlayer.addEventListener("volumechange",()=>{n.value=videoPlayer.volume;if(r)r.innerText=Math.round(videoPlayer.volume*100)+"%"})
        }
    });
}();
</script>
</body>
</html>
