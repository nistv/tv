<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>NIS TV Pro⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #e50914;
            --text: #fff;
            --text-secondary: #ccc;
            --hover: #2a2a2a;
            --border-dim: rgba(255,255,255,0.08);
            --input-bg: rgba(255,255,255,.07);
            --shadow: rgba(0,0,0,0.5);
        }
        [data-theme="light"] {
            --bg: #f5f5f5;
            --card: #ffffff;
            --accent: #e50914;
            --text: #1a1a1a;
            --text-secondary: #444;
            --hover: #e0e0e0;
            --border-dim: rgba(0,0,0,0.1);
            --input-bg: rgba(0,0,0,0.04);
            --shadow: rgba(0,0,0,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; transition: background 0.2s, color 0.2s; }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
        
        /* ------ টপবার ------ */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 24px; background: rgba(0,0,0,0.6); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-dim); flex-shrink: 0;
        }
        [data-theme="light"] .top-bar { background: rgba(255,255,255,0.7); }
        .left-group { display: flex; align-items: center; gap: 20px; }
        .brand-logo {
            display: flex; align-items: center; gap: 10px;
            background: linear-gradient(135deg, rgba(229,9,20,0.2), rgba(0,0,0,0.4));
            padding: 5px 16px; border-radius: 40px; border-left: 3px solid var(--accent);
        }
        .brand-logo i { font-size: 1.6rem; color: var(--accent); }
        .brand-name { font-weight: 800; font-size: 1.4rem; background: linear-gradient(135deg, #fff, #ffb3b3); -webkit-background-clip: text; background-clip: text; color: transparent; }
        [data-theme="light"] .brand-name { background: linear-gradient(135deg, #111, #e50914); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .brand-tag { font-size: 0.65rem; background: rgba(229,9,20,0.8); padding: 2px 8px; border-radius: 30px; font-weight: 600; color: white; }
        .theme-toggle {
            background: var(--input-bg); border: 1px solid var(--border-dim); border-radius: 50px;
            padding: 6px 12px; cursor: pointer; color: var(--text); font-size: 0.9rem;
            display: flex; align-items: center; gap: 6px; transition: 0.2s;
        }
        .theme-toggle:hover { background: var(--accent); color: white; }
        .social-icons a { color: var(--text-secondary); font-size: 1.4rem; margin-left: 18px; transition: 0.2s; }
        .social-icons a:hover { color: var(--accent); transform: scale(1.05); }

        .main-row { display: flex; flex: 1; min-height: 0; overflow: hidden; }
        .player-section { flex: 3; display: flex; flex-direction: column; background: #000; padding: 20px; gap: 16px; overflow-y: auto; }
        .video-container { position: relative; background: #000; border-radius: 24px; overflow: hidden; box-shadow: 0 15px 30px var(--shadow); width: 100%; height: 65vh; min-height: 480px; }
        #video-player { width: 100%; height: 100%; object-fit: contain; background: black; }
        .video-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .video-info h1 { font-size: 1.3rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .live-badge { background: var(--accent); font-size: 0.7rem; padding: 3px 10px; border-radius: 30px; font-weight: 600; }

        .quality-selector,
        .quality-selector option {
            background-color: #2a2a2a !important;
            color: #ffffff !important;
            border: 1px solid var(--border-dim);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            outline: none;
            min-width: 130px;
        }
        .quality-selector:hover,
        .quality-selector:focus {
            background-color: #2a2a2a !important;
            color: #ffffff !important;
        }
        [data-theme="light"] .quality-selector,
        [data-theme="light"] .quality-selector option {
            background-color: #2a2a2a !important;
            color: #ffffff !important;
        }

        .sidebar { flex: 1.2; min-width: 320px; background: var(--card); display: flex; flex-direction: column; border-left: 1px solid var(--border-dim); overflow: hidden; }
        .search-container { padding: 14px 20px 10px 20px; border-bottom: 1px solid var(--border-dim); }
        #channel-search { width: 100%; padding: 8px 14px; border-radius: 32px; border: 1px solid var(--border-dim); background: var(--input-bg); color: var(--text); font-size: 0.8rem; outline: none; }
        #channel-search:focus { border-color: var(--accent); }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; max-height: 70px; overflow-y: auto; }
        .cat-tab { padding: 5px 12px; border-radius: 30px; background: rgba(128,128,128,0.15); color: var(--text); font-size: 11px; border: none; cursor: pointer; white-space: nowrap; }
        .cat-tab.active { background: var(--accent); color: white; }
        .channel-list { list-style: none; margin: 0; padding: 16px; display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 14px; overflow-y: auto; flex: 1; }
        .channel-item { background: rgba(128,128,128,0.08); border-radius: 16px; cursor: pointer; text-align: center; transition: 0.2s; border: 2px solid transparent; padding: 10px 4px; }
        .channel-item:hover { background: var(--hover); transform: translateY(-2px); }
        .channel-item.active { border-color: var(--accent); background: rgba(229,9,20,0.1); }
        .logo-wrapper { width: 60px; height: 60px; margin: 0 auto 6px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 5px; }
        .channel-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
        .channel-logo { max-width: 100%; max-height: 100%; object-fit: contain; }
        .channel-name { font-size: 0.65rem; font-weight: 600; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .app-footer { background: rgba(0,0,0,0.7); text-align: center; padding: 8px 12px; font-size: 0.65rem; color: #aaa; border-top: 1px solid var(--border-dim); flex-shrink: 0; }
        [data-theme="light"] .app-footer { background: rgba(240,240,240,0.8); color: #333; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; z-index: 10; backdrop-filter: blur(6px); border-radius: 24px; flex-direction: column; gap: 8px; }
        .global-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0a; z-index: 2000; display: flex; align-items: center; justify-content: center; color: white; flex-direction: column; gap: 12px; }
        [data-theme="light"] .global-loader { background: #f0f0f0; color: #111; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #222; }
        ::-webkit-scrollbar-thumb { background: var(--accent); }

        /* ========== ট্যাবলেট/ডেস্কটপ  ========== */
        @media (max-width: 992px) {
            .main-row { flex-direction: column; }
            .sidebar { min-width: 100%; max-height: 45vh; }
            .video-container { height: 50vh; min-height: 300px; }
            body, html { overflow: auto; }
            .app-container { overflow-y: auto; }
        }
        
        /* ========== মোবাইলের প্লেয়ার সাইজ ========== */
        @media (max-width: 768px) {
            .social-icons, .brand-tag { display: none !important; }
            
            body, html { overflow: auto; height: auto; }
            .app-container { height: auto; min-height: 100vh; overflow: visible; display: block; }
            .main-row { display: block; height: auto; overflow: visible; }
            
            /* টপবার */
            .top-bar { padding: 4px 12px !important; background: #000 !important; border-bottom: none; }
            .brand-logo { padding: 2px 8px !important; gap: 5px; background: transparent; border-left: 2px solid var(--accent); }
            .brand-name { font-size: 0.9rem !important; }
            .brand-logo i { font-size: 1rem !important; }
            .theme-toggle span { display: none; }
            .theme-toggle { padding: 4px 8px; font-size: 0.8rem; background: rgba(255,255,255,0.1); }
            
            /* প্লেয়ার সেকশন সাইজ */
            .player-section { padding: 0 !important; gap: 0 !important; background: #000; display: block; height: auto; overflow: visible; }
            .video-container { border-radius: 0 !important; height: 30vh !important; min-height: 230px; box-shadow: none; margin: 0; width: 100%; }
            #video-player { object-fit: contain; }
            
            /* ভিডিও ইনফো */
            .video-info { padding: 8px 12px !important; margin: 0; background: #000; border-bottom: 1px solid #1a1a1a; }
            .video-info h1 { font-size: 0.9rem; }
            .live-badge { font-size: 0.6rem; padding: 2px 7px; }
            .quality-selector { min-width: 100px; font-size: 0.65rem; padding: 4px 8px; }
            
            /* সাইডবার */
            .sidebar { background: #000 !important; border-left: none; border-top: none; height: auto !important; max-height: none !important; display: block; overflow: visible; margin: 0; }
            .search-container { padding: 8px 10px 4px 10px !important; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; }
            #channel-search { background: #1c1c1c; border: none; font-size: 0.7rem; padding: 6px 10px; border-radius: 30px; }
            .category-tabs { margin-top: 6px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; gap: 5px; max-height: none; }
            .cat-tab { font-size: 9px; padding: 4px 10px; background: #1e1e1e; }
            
            /* চ্যানেল গ্রিড */
            .channel-list { padding: 8px 6px 16px 6px !important; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)) !important; gap: 6px; background: #000; overflow-y: visible; height: auto; }
            .logo-wrapper { width: 44px; height: 44px; background: #111; margin-bottom: 3px; }
            .channel-name { font-size: 0.5rem; font-weight: 500; }
            .channel-item { background: #0f0f0f; padding: 4px 2px; border-radius: 10px; }
            
            .app-footer { padding: 8px 6px; font-size: 0.45rem; background: #050505; border-top: none; }
            .loading-overlay { border-radius: 0; font-size: 10px; }
        }
        
        /* অতিক্ষুদ্র ডিভাইস */
        @media (max-width: 480px) {
            .channel-list { grid-template-columns: repeat(auto-fill, minmax(62px, 1fr)) !important; gap: 5px; }
            .logo-wrapper { width: 40px; height: 40px; }
            .channel-name { font-size: 0.45rem; }
        }
    </style>
</head>
<body data-theme="dark">
<div class="app-container">
    <div class="top-bar">
        <div class="left-group">
            <div class="brand-logo"><i class="fas fa-tv"></i><div><span class="brand-name">NIS TV Pro</span><span class="brand-tag">LIVE</span></div></div>
            <div class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> <span id="themeText">ডার্ক</span></div>
        </div>
        <div class="social-icons"><a href="https://facebook.com/nisobuj01" target="_blank" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a><a href="https://t.me/nisobuj00" target="_blank" aria-label="Telegram"><i class="fab fa-telegram-plane"></i></a></div>
    </div>
    <div class="main-row">
        <main class="player-section">
            <div class="video-container" id="video-container"><video id="video-player" controls playsinline preload="auto"></video></div>
            <div class="video-info">
                <h1 id="now-playing-title">📺 T Sports 2 <span class="live-badge">LIVE</span></h1>
                <select id="quality-selector" class="quality-selector" disabled><option value="auto">⚡ Auto (স্বয়ংক্রিয়)</option></select>
            </div>
        </main>
        <aside class="sidebar">
            <div class="search-container">
                <input id="channel-search" placeholder="🔍 চ্যানেল খুঁজুন..." autocomplete="off">
                <div class="category-tabs" id="dynamic-category-tabs"><button class="cat-tab active" data-cat="all">📡 সবগুলো</button></div>
            </div>
            <ul class="channel-list" id="listbar"><li style="text-align:center; padding: 30px;">📡 লোড হচ্ছে...</li></ul>
        </aside>
    </div>
    <footer class="app-footer"><span>We do not stream any channel. We only show you from third party websites | 2026 NIS TV Pro</span></footer>
</div>
<div id="global-loader" class="global-loader"><i class="fas fa-tv" style="font-size: 42px; color:#e50914;"></i><div>NIS TV Pro 🚀</div></div>

<script>
    const PROXY_URL = "https://tv-proxy.shahinrhss99.workers.dev";
    const getConfigUrl = () => `${PROXY_URL}?source=playlist&t=${Date.now()}`;
    
    let FIXED_PLAYLISTS = [];
    let allChannels = [], activeCategory = "all", currentChannel = null, hls = null, searchQuery = "";
    let currentLoadRetries = 0, MAX_RETRIES = 2, retryTimeout = null, globalErrorShown = false;
    const qualitySelector = document.getElementById("quality-selector");
    const listBar = document.getElementById("listbar"), titleEl = document.getElementById("now-playing-title");
    const videoPlayer = document.getElementById("video-player"), searchInput = document.getElementById("channel-search");
    const catsContainer = document.getElementById("dynamic-category-tabs"), globalLoader = document.getElementById("global-loader");
    const themeToggle = document.getElementById("themeToggleBtn");

    // ---------- থিম ----------
    function initTheme() { let saved = localStorage.getItem("nis_theme") || "dark"; document.body.setAttribute("data-theme", saved); updateThemeUI(saved); }
    function updateThemeUI(theme) { const icon = themeToggle.querySelector("i"), span = document.getElementById("themeText"); if(theme==="dark"){ icon.className="fas fa-moon"; span.innerText="ডার্ক"; } else { icon.className="fas fa-sun"; span.innerText="লাইট"; } }
    function toggleTheme() { const cur = document.body.getAttribute("data-theme"); const next = cur === "dark" ? "light" : "dark"; document.body.setAttribute("data-theme", next); localStorage.setItem("nis_theme", next); updateThemeUI(next); }
    themeToggle.addEventListener("click", toggleTheme); initTheme();

    // ---------- কোয়ালিটি সিলেক্টর ----------
    function populateQualitySelectorWithLevels(levels) {
        if (!qualitySelector) return;
        qualitySelector.innerHTML = "";
        const autoOption = document.createElement("option");
        autoOption.value = "auto";
        autoOption.textContent = "⚡ Auto (স্বয়ংক্রিয়)";
        qualitySelector.appendChild(autoOption);
        if (!levels || levels.length === 0) {
            qualitySelector.disabled = true;
            const disabledOpt = document.createElement("option");
            disabledOpt.textContent = "❌ কোয়ালিটি তথ্য নেই";
            disabledOpt.disabled = true;
            qualitySelector.appendChild(disabledOpt);
            return;
        }
        qualitySelector.disabled = false;
        const sortedLevels = [...levels].sort((a,b) => (a.height || 0) - (b.height || 0));
        for (let i = 0; i < sortedLevels.length; i++) {
            const lvl = sortedLevels[i];
            let label = "";
            const height = lvl.height;
            if (height) {
                if (height <= 240) label = "426x240";
                else if (height <= 360) label = "640x360";
                else if (height <= 480) label = "854x480";
                else if (height <= 720) label = "1280x720";
                else label = "1920x1080";
                if (label === "1920x1080" && height < 1080 && height > 720) label = `${height}p`;
            } else if (lvl.bitrate) {
                label = `${Math.round(lvl.bitrate/1000)} kbps`;
            } else {
                label = `কোয়ালিটি ${i+1}`;
            }
            const originalIdx = levels.findIndex(orig => orig === lvl);
            const option = document.createElement("option");
            option.value = originalIdx;
            option.textContent = label;
            qualitySelector.appendChild(option);
        }
        qualitySelector.value = "auto";
        if (hls) hls.currentLevel = -1;
    }

    function attachQualityEvents() {
        if (!qualitySelector) return;
        qualitySelector.onchange = () => {
            const val = qualitySelector.value;
            if (hls) {
                if (val === "auto") hls.currentLevel = -1;
                else hls.currentLevel = parseInt(val, 10);
            }
        };
    }

    function destroyHls() {
        if (hls) { try { hls.destroy(); } catch(e) {} hls = null; }
        if (retryTimeout) clearTimeout(retryTimeout);
        if (qualitySelector) qualitySelector.disabled = true;
    }

    function scheduleRetry(url) {
        if (currentLoadRetries >= MAX_RETRIES) {
            if (!globalErrorShown) {
                globalErrorShown = true;
                alert("⚠️একাধিক চেষ্টা ব্যর্থ! নেটওয়ার্ক চেক করুন বা অন্য চ্যানেল নির্বাচন করুন।");
            }
            const ld = document.querySelector(".loading-overlay");
            if(ld) ld.remove();
            return;
        }
        currentLoadRetries++;
        const delay = currentLoadRetries * 1500;
        if (retryTimeout) clearTimeout(retryTimeout);
        let ld = document.querySelector(".loading-overlay");
        if (ld) ld.innerHTML = `<i class="fas fa-sync-alt fa-spin"></i> পুনরায় চেষ্টা (${currentLoadRetries}/${MAX_RETRIES})...`;
        retryTimeout = setTimeout(() => { performLoadWithRetry(url); }, delay);
    }

    function performLoadWithRetry(url) {
        videoPlayer.pause();
        destroyHls();
        let loadingDiv = document.querySelector(".loading-overlay");
        if (!loadingDiv) {
            loadingDiv = document.createElement("div");
            loadingDiv.className = "loading-overlay";
            document.getElementById("video-container").appendChild(loadingDiv);
        }
        loadingDiv.style.display = "flex";
        loadingDiv.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> স্ট্রিম খোলা হচ্ছে (${currentLoadRetries+1}/${MAX_RETRIES+1})`;

        if (Hls.isSupported()) {
            hls = new Hls({ enableWorker: true, lowLatencyMode: true });
            hls.loadSource(url);
            hls.attachMedia(videoPlayer);
            let fatalHandled = false;
            const manifestHandler = () => {
                globalErrorShown = false; currentLoadRetries = 0;
                loadingDiv?.remove();
                videoPlayer.play().catch(e=>console.log);
                if (hls && hls.levels && hls.levels.length) {
                    populateQualitySelectorWithLevels(hls.levels);
                    if (qualitySelector.value !== "auto") qualitySelector.value = "auto";
                    if (hls.currentLevel !== -1) hls.currentLevel = -1;
                } else {
                    qualitySelector.disabled = true;
                    qualitySelector.innerHTML = '<option value="auto">Auto</option><option disabled>কোয়ালিটি নেই</option>';
                }
                cleanupEvents();
            };
            const errorHandler = (event, data) => {
                if (data.fatal) {
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) { cleanupEvents(); scheduleRetry(url); }
                    else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) { if (hls) hls.recoverMediaError(); }
                    else { cleanupEvents(); scheduleRetry(url); }
                } else if (data.details === 'manifestLoadError' && !fatalHandled) {
                    fatalHandled = true; cleanupEvents(); scheduleRetry(url);
                }
            };
            const cleanupEvents = () => { if(hls) { hls.off(Hls.Events.MANIFEST_PARSED, manifestHandler); hls.off(Hls.Events.ERROR, errorHandler); } };
            hls.on(Hls.Events.MANIFEST_PARSED, manifestHandler);
            hls.on(Hls.Events.ERROR, errorHandler);
        } else {
            loadingDiv?.remove();
            if(!globalErrorShown) alert("আপনার ব্রাউজার HLS সমর্থন করে না।");
        }
    }

    function loadStream(url) {
        if (retryTimeout) clearTimeout(retryTimeout);
        currentLoadRetries = 0; globalErrorShown = false;
        if (qualitySelector) {
            qualitySelector.disabled = true;
            qualitySelector.innerHTML = '<option value="auto">⚡ Auto (স্বয়ংক্রিয়)</option><option disabled>লোড হচ্ছে...</option>';
        }
        performLoadWithRetry(url);
    }

    // ---------- কনফিগ লোড ----------
    async function loadPlaylistConfig() {
        try {
            const response = await fetch(getConfigUrl());
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            FIXED_PLAYLISTS = data.sources || [];
            console.log("✅ কনফিগ লোড সফল:", FIXED_PLAYLISTS);
        } catch (error) {
            console.error("❌ কনফিগ লোড ব্যর্থ:", error);
            FIXED_PLAYLISTS = [];
        }
    }

    async function fetchM3uPlaylist(sourceKey) {
        try {
            const resp = await fetch(`${PROXY_URL}?source=${sourceKey}`);
            if (!resp.ok) return "";
            return await resp.text();
        } catch(e) {
            console.error(`M3U ফেচ ব্যর্থ ${sourceKey}:`, e);
            return "";
        }
    }

    async function parseM3uContent(content) {
        const lines = content.split(/\r?\n/);
        const channels = [];
        let current = null;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF')) {
                const nameMatch = line.match(/#EXTINF:[^,]*,?(.*)$/);
                let name = nameMatch?.[1]?.trim() || "চ্যানেল";
                let logo = "";
                let cat = "Other";
                const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
                if (logoMatch) logo = logoMatch[1];
                const grpMatch = line.match(/group-title="([^"]*)"/i);
                if (grpMatch) cat = grpMatch[1];
                current = { name, logo, category: cat };
            }
            else if (line && !line.startsWith('#') && current) {
                let streamUrl = line;
                channels.push({
                    name: current.name.substring(0,45),
                    url: streamUrl,
                    category: current.category || "Other",
                    logo: current.logo || ""
                });
                current = null;
            }
            else if (line && !line.startsWith('#') && (line.includes('.m3u8') || line.includes('.ts'))) {
                channels.push({ name: `চ্যানেল ${channels.length+1}`, url: line, category: "Other", logo: "" });
            }
        }
        return channels;
    }

    async function loadAllPlaylists() {
        if (!FIXED_PLAYLISTS.length) return [];
        const results = await Promise.allSettled(FIXED_PLAYLISTS.map(async (item) => {
            if (!item.sourceKey) return [];
            const content = await fetchM3uPlaylist(item.sourceKey);
            if (!content) return [];
            return await parseM3uContent(content);
        }));
        let merged = [];
        for (const r of results) if (r.status === 'fulfilled') merged.push(...r.value);
        const unique = new Map();
        for (const ch of merged) if (!unique.has(ch.url)) unique.set(ch.url, ch);
        let final = Array.from(unique.values());
        final = final.map(ch => ({
            ...ch,
            logo: (ch.logo && ch.logo.startsWith('http')) ? ch.logo : `https://ui-avatars.com/api/?background=e50914&color=fff&rounded=true&size=70&bold=true&name=${encodeURIComponent(ch.name.slice(0,2))}`
        }));
        return final;
    }

    function buildCategoryTabs(list) {
        const cats = new Set(["all"]);
        // গ্রুফ অনুযায়ী মোট চ্যানেলের সংখ্যা জানার জন্য একটি অবজেক্ট ম্যাপ তৈরি
        const catCounts = {};
        
        list.forEach(ch => { 
            const catName = ch.category || "Other";
            cats.add(catName); 
            catCounts[catName] = (catCounts[catName] || 0) + 1;
        });
        
        const sorted = Array.from(cats).sort((a,b)=> a==='all'? -1 : b==='all'? 1 : a.localeCompare(b));
        catsContainer.innerHTML = "";
        
        sorted.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "cat-tab";
            if (cat === activeCategory) btn.classList.add("active");
            btn.setAttribute("data-cat", cat);
            
            // সবগুলো এবং বাকি অন্যান্য গ্রুফ বা ক্যাটাগরির পাশেও ব্র্যাকেটে মোট কাউন্ট যোগ করা হলো
            if (cat === "all") {
                btn.innerText = `📡 সবগুলো (${list.length})`;
            } else {
                btn.innerText = `${cat} (${catCounts[cat] || 0})`;
            }
            
            btn.onclick = () => {
                document.querySelectorAll(".cat-tab").forEach(t=>t.classList.remove("active"));
                btn.classList.add("active");
                activeCategory = cat;
                filterRender();
            };
            catsContainer.appendChild(btn);
        });
    }

    function filterRender() {
        if (!allChannels.length) return;
        let filtered = allChannels.filter(ch => {
            const matchCat = activeCategory === "all" || ch.category === activeCategory;
            const matchSearch = searchQuery === "" || ch.name.toLowerCase().includes(searchQuery.toLowerCase());
            return matchCat && matchSearch;
        });
        renderChannels(filtered);
    }

    function renderChannels(arr) {
        listBar.innerHTML = "";
        if (!arr.length) { listBar.innerHTML = `<div style="padding:30px;text-align:center;">😞 কোন চ্যানেল নেই</div>`; return; }
        for (let ch of arr) {
            const li = document.createElement("li");
            li.className = "channel-item";
            if (currentChannel && currentChannel.url === ch.url) li.classList.add("active");
            const logoUrl = ch.logo || `https://ui-avatars.com/api/?background=2c2c2c&color=e50914&rounded=true&size=60&name=${encodeURIComponent(ch.name.charAt(0))}`;
            li.innerHTML = `<div class="logo-wrapper"><img src="${logoUrl}" class="channel-logo" onerror="this.src='https://ui-avatars.com/api/?background=555&color=fff&rounded=true&size=60&text=${encodeURIComponent(ch.name.slice(0,2))}'"></div><div class="channel-name">${escapeHtml(ch.name)}</div>`;
            li.onclick = () => {
                if (retryTimeout) clearTimeout(retryTimeout);
                currentLoadRetries = 0; globalErrorShown = false;
                currentChannel = ch;
                titleEl.innerHTML = `${escapeHtml(ch.name)} <span class="live-badge">LIVE</span>`;
                loadStream(ch.url);
                document.querySelectorAll(".channel-item").forEach(i=>i.classList.remove("active"));
                li.classList.add("active");
                if (window.innerWidth < 992) document.querySelector(".player-section")?.scrollIntoView({ behavior: "smooth" });
            };
            listBar.appendChild(li);
        }
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

    searchInput.addEventListener("input", e => { searchQuery = e.target.value; filterRender(); });

    async function initApp() {
        globalLoader.style.display = "flex";
        await loadPlaylistConfig();
        if (!FIXED_PLAYLISTS.length) {
            listBar.innerHTML = `<div style="padding:20px;">⚠️ প্লেলিস্ট কনফিগ পাওয়া যায়নি।</div>`;
            globalLoader.style.display = "none";
            return;
        }
        const channels = await loadAllPlaylists();
        if (!channels.length) { 
            listBar.innerHTML = `<div style="padding:20px;">⚠️ কোনো চ্যানেল পাওয়া যায়নি।</div>`; 
            globalLoader.style.display = "none"; 
            return; 
        }
        allChannels = channels;
        buildCategoryTabs(allChannels);
        activeCategory = "all"; searchQuery = "";
        filterRender();
        if (allChannels.length) {
            const first = allChannels[0];
            currentChannel = first;
            titleEl.innerHTML = `${escapeHtml(first.name)} <span class="live-badge">LIVE</span>`;
            loadStream(first.url);
        }
        attachQualityEvents();
        globalLoader.style.opacity = "0";
        setTimeout(() => globalLoader.style.display = "none", 400);
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) { if (hls) hls.stopLoad(); videoPlayer.pause(); }
        else { if (hls) hls.startLoad(); if (currentChannel && videoPlayer.paused && videoPlayer.src) videoPlayer.play().catch(e=>{}); }
    });

    initApp();
</script>
</body>
